version: 1

# Canonical checkpoint registry. Large checkpoint files remain under
# checkpoints/ and are ignored by git; this file is the tracked source of truth
# for model ids, paths, generation settings, and readiness.
#
# Command entries may use:
#   {repo_root} {checkpoint_path} {output} {output_dir}
#   {dataset} {suite_id} {seq_len} {n_samples} {seed} {model_id} {label}

checkpoints:
  # -------------------------------------------------------------------------
  # LM1B: FLM/FMLM checkpoints released with arXiv:2602.16813.
  # These use the david3684/flm Hydra sampler.
  # -------------------------------------------------------------------------
  - id: lm1b_flm_1024_nfe
    label: FLM 1024-NFE
    dataset: lm1b
    family: flm
    enabled: true
    adapter: command
    path: checkpoints/lm1b/flm/base/model.ckpt
    source: https://github.com/david3684/flm
    generation:
      backend: flm-hydra
      algo: flm
      nfe: 1024
      paper_aligned: true
    command:
      - python3
      - scripts/generate_corpus.py
      - flm-hydra
      - --checkpoint
      - "{checkpoint_path}"
      - --output
      - "{output}"
      - --dataset
      - "{dataset}"
      - --suite-id
      - "{suite_id}"
      - --model-id
      - "{model_id}"
      - --label
      - "{label}"
      - --seq-len
      - "{seq_len}"
      - --n-samples
      - "{n_samples}"
      - --seed
      - "{seed}"
      - --algo
      - flm
      - --steps
      - "1024"
      - --nfe
      - "1024"
      - --eval-batch-size
      - "32"
      - --double-temb
      - "false"
      - --disable-ema
      - "false"

